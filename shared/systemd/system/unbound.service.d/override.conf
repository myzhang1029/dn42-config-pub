[Service]
ExecStartPost=/usr/bin/sh -c '[ -f /var/lib/unbound/unbound.cache ] && /usr/sbin/unbound-control load_cache < /var/lib/unbound/unbound.cache'
ExecStop=/usr/bin/sh -c '/usr/sbin/unbound-control dump_cache > /var/lib/unbound/unbound.cache'
ExecStop=/usr/sbin/unbound-control stop
ExecReload=
ExecReload=/usr/sbin/unbound-control reload_keep_cache
OOMScoreAdjust=-500
CapabilityBoundingSet=CAP_NET_BIND_SERVICE CAP_SETGID CAP_SETUID CAP_SYS_CHROOT CAP_SYS_RESOURCE CAP_NET_ADMIN CAP_DAC_OVERRIDE
LockPersonality=true
MemoryDenyWriteExecute=true
NoNewPrivileges=true
PrivateDevices=true
PrivateTmp=true
#ProcSubset=pid
ProtectClock=true
ProtectControlGroups=true
ProtectHome=true
ProtectHostname=true
ProtectKernelModules=true
ProtectKernelLogs=true
ProtectKernelTunables=true
ProtectProc=invisible
ProtectSystem=strict
ReadWritePaths=/var/lib/unbound
RestrictAddressFamilies=AF_INET AF_INET6 AF_NETLINK AF_UNIX
RestrictNamespaces=true
RestrictSUIDSGID=true
RestrictRealtime=true
SystemCallArchitectures=native
UMask=0077
SystemCallFilter=~@clock @cpu-emulation @debug @keyring @module mount @obsolete @reboot @resources @swap
