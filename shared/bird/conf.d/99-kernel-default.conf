# Filter for kernel exports
include "/etc/bird/conf.d/99-kernel-filter.subconf";

protocol kernel kernel_v4 {
    scan time 30;

    ipv4 {
        table master4;
        import filter kernel_import4;
        export filter kernel_export4;
    };
}

protocol kernel kernel_v6 {
    scan time 30;

    ipv6 {
        table master6;
        import filter kernel_import6;
        export filter kernel_export6;
    };
}
