protocol bgp nedifinita_ix from dnpeers {
    neighbor fd10:127:42:ffff::1 as 4204549999;
    local role rs_client;
    bfd on;

    ipv4 {
        table dn42_v4;
        extended next hop on;
        add paths rx;
        import where dn42_ebgp_import_v4();
        export filter {
            if bgp_path.len > 0 then reject;
            dn42_ebgp_export_v4();
        };
    };

    ipv6 {
        table dn42_v6;
        add paths rx;
        import where dn42_ebgp_import_v6();
        export filter {
            if bgp_path.len > 0 then reject;
            dn42_ebgp_export_v6();
        };
    };
}
